<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">
  <title>RANGSHIN_Order</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      overflow: hidden;
    }

    #appFrame {
      border: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: #fff;
    }

    .fabWrap {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
    }

    .fabBtn {
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      background: #8b1e1e;
      color: #fff;
      box-shadow: 0 4px 14px rgba(0,0,0,.18);
      cursor: pointer;
    }

    .fabBtn.secondary {
      background: #fff;
      color: #8b1e1e;
      border: 1px solid #8b1e1e;
    }

    .hintBox {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 70px;
      z-index: 9999;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
      font: 15px/1.45 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      display: none;
    }

    .hintBox b { color: #8b1e1e; }
    .hintClose {
      margin-top: 10px;
      border: 0;
      background: #8b1e1e;
      color: #fff;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <iframe
    id="appFrame"
    allow="clipboard-write"
    referrerpolicy="no-referrer"
  ></iframe>

  <div class="fabWrap">
    <button class="fabBtn secondary" id="btnGuide">Cài app</button>
  </div>

  <div class="hintBox" id="hintBox">
    <div id="hintText"></div>
    <button class="hintClose" id="btnCloseHint">Đóng</button>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/rangshin-order/sw.js");
    }

    const WEBAPP = "https://script.google.com/macros/s/AKfycbw88IlRHEkiGzJisfKoOcydSirEHrLoRnzV01vw5DYL8iO916c-1CqADa73fm4x-htj/exec";
    document.getElementById("appFrame").src = WEBAPP;

    const ua = navigator.userAgent || "";
    const isIOS = /iPhone|iPad|iPod/i.test(ua);
    const isInApp = /Zalo|FBAN|FBAV|Instagram|Messenger|Telegram/i.test(ua);

    const hintBox = document.getElementById("hintBox");
    const hintText = document.getElementById("hintText");
    const btnGuide = document.getElementById("btnGuide");
    const btnCloseHint = document.getElementById("btnCloseHint");

    btnGuide.onclick = () => {
      if (isInApp) {
        hintText.innerHTML =
          'Bạn đang mở trong <b>trình duyệt nhúng</b>.<br><br>' +
          'Muốn cài app: bấm <b>⋮</b> → <b>Mở bằng trình duyệt</b> / <b>Open in browser</b>, rồi vào menu Chrome để thêm app ra màn hình chính.';
      } else if (isIOS) {
        hintText.innerHTML =
          'Trên iPhone/iPad: bấm <b>Share</b> → <b>Add to Home Screen</b>.';
      } else {
        hintText.innerHTML =
          'Trên Android Chrome: bấm <b>⋮</b> → <b>Install app</b> / <b>Thêm vào màn hình chính</b>.';
      }
      hintBox.style.display = "block";
    };

    btnCloseHint.onclick = () => {
      hintBox.style.display = "none";
    };
  </script>
</body>
</html>
